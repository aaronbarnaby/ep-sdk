name: CI/CD

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # This job uses skip-duplicate-actions to skip one of the duplicate workflow runs when you push to a branch with an open PR.
  check_duplicate_workflow:
    runs-on: ubuntu-22.04
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.0
        with:
          skip_after_successful_duplicate: 'true'
          concurrent_skipping: 'same_content_newer'
          do_not_skip: '["push"]'

  lint:
    needs: [check_duplicate_workflow]
    runs-on: ubuntu-22.04
    if: ${{ needs.check_duplicate_workflow.outputs.should_skip != 'true' }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Run lint
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck

  build:
    needs: [check_duplicate_workflow]
    runs-on: ubuntu-22.04
    if: ${{ needs.check_duplicate_workflow.outputs.should_skip != 'true' }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Build bundles
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-${{ github.run_id }}-bundles
          path: dist
          retention-days: 3

  test:
    needs: [check_duplicate_workflow]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: ${{ needs.check_duplicate_workflow.outputs.should_skip != 'true' }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Run tests
        run: |
          bun install --frozen-lockfile
          bun run test-output
      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-${{ github.run_id }}-${{ github.job }}-results
          path: test-results
          retention-days: 3
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/**/*.xml

  release:
    needs: [lint, build, test]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Release, publish package
        run: |
          bun install --frozen-lockfile
          bun run build
          bunx semantic-release
